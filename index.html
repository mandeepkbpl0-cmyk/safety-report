<!DOCTYPE html>
<html>
<head>

<title>Veerka Beverage Safety Reporting</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
}

.header{
background:#008060;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input, select, textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#008060;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#00664d;
}

</style>

</head>

<body>

<div class="header">

<h2>Veerka Beverage Pvt Ltd, Goindwal Sahib</h2>

<h3>Safety Observation Reporting System</h3>

</div>

<div class="container">
form action="https://formsubmit.co/mandeepkbpl0@gmail.com" method="POST" enctype="multipart/form-data">

<label>Employee Name</label>
<input type="text" name="name" required>

<label>Department</label>
<input type="text" name="department" required>

<label>Select Area</label>

<option>Area 18</option>
<option>Area 19</option>
<option>Area 20</option>

<option>Area 23</option>
<option>Area 24</option>
<option>Area 25</option>
<option>Area 26</option>
<option>Area 27</option>
<option>Area 28</option>
<option>Area 29</option>
<option>Area 30</option>

<option>Area 31</option>
<option>Area 32</option>
<option>Area 33</option>
<option>Area 34</option>
<option>Area 35</option>

</select>

<label>Upload Photo</label>

<input type="file" name="photo" accept="image/*">

<label>Observation Details</label>

<textarea name="message" rows="4" required></textarea>

<button type="submit">Submit Report</button>

</form>

</div>

</body>
</html>
