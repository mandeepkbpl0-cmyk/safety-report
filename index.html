<div class="container">

<form action="https://formsubmit.co/mandeepkbpl0@gmail.com" method="POST" enctype="multipart/form-data">

<label>Employee Name</label>
<input type="text" name="name" required>

<label>Department</label>
<input type="text" name="department" required>

<label>Select Area</label>

<select name="area" required>

<option value="">Select Area</option>

<option>Main Building</option>
<option>Preform Storage area</option>
<option>Power House</option>
<option>ETP Area</option>
<option>Boiler Area</option>
<option>WTP Area</option>
<option>Shipping area</option>

</select>

<label>Upload Photo</label>

<input type="file" name="photo" accept="image/*">

<label>Observation Details</label>

<textarea name="message" rows="4" required></textarea>

<button type="submit">Submit Report</button>

</form>

</div>
