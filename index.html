<!DOCTYPE html>
<html>

<head>

<title>Safety Observation Reporting</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#eef2f3;
margin:0;
}

.header{
background:#00695c;
color:white;
padding:25px;
text-align:center;
}

.container{
max-width:650px;
background:white;
margin:auto;
margin-top:30px;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

label{
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#00695c;
color:white;
border:none;
padding:14px;
width:100%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#004d40;
}

.footer{
text-align:center;
margin-top:20px;
font-size:14px;
color:gray;
}

</style>

</head>

<body>

<div class="header">

<h2>Veerka Beverage Pvt Ltd</h2>
<h3>Safety Observation Reporting System</h3>

</div>

<div class="container">

<form id="safetyForm">

<label>Employee Name</label>
<input type="text" id="name" required>

<label>Department</label>
<input type="text" id="department" required>

<label>Category</label>

<select id="category">

<option>Unsafe Act</option>
<option>Unsafe Condition</option>
<option>Near Miss</option>

</select>

<label>Area</label>

<select id="area">

<option>Main Building</option>
<option>Preform Storage</option>
<option>Power House</option>
<option>Boiler Area</option>
<option>WTP Area</option>
<option>ETP Area</option>

</select>

<label>Observation Details</label>

<textarea id="observation" rows="4"></textarea>

<button type="submit">Submit Report</button>

</form>

</div>

<div class="footer">

Safety Department – Veerka Beverage Pvt Ltd

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbyKm9Ooend7JwpjLM-RAVsnYM5pHe6Dj6eG0psnftlPO2OJKPdVqiiU4BIVSskPolLu/exec";

document.getElementById("safetyForm").addEventListener("submit",function(e){

e.preventDefault();

let data={

name:document.getElementById("name").value,
department:document.getElementById("department").value,
category:document.getElementById("category").value,
area:document.getElementById("area").value,
observation:document.getElementById("observation").value

};

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>alert("Report Submitted Successfully"))
.catch(err=>alert("Error submitting form"));

});

</script>

</body>

</html>
